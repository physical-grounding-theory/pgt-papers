# Verify that every paper builds from source with pandoc (HTML) + tectonic (PDF).
#
# This is a CHECK, not a deploy: GitHub Pages continues to serve the committed
# files from the `main` branch. Authors build locally (`make`) and commit the
# generated index.html / <slug>.pdf; this workflow guarantees the sources still
# build cleanly, and uploads the freshly built outputs as a downloadable
# artifact for convenience.

name: build-papers

on:
  push:
    branches: [ main ]
    paths:
      - 'papers/**'
      - 'template/**'
      - 'assets/**'
      - 'build.sh'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'papers/**'
      - 'template/**'
      - 'assets/**'
      - 'build.sh'
  workflow_dispatch: {}

concurrency:
  group: build-papers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          ver=3.9.0.1
          curl -fsSL -o pandoc.deb \
            "https://github.com/jgm/pandoc/releases/download/${ver}/pandoc-${ver}-1-amd64.deb"
          sudo dpkg -i pandoc.deb
          pandoc --version | head -1

      - name: Install tectonic (LaTeX engine for PDF)
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/
          tectonic --version

      - name: Build all papers
        run: PDF_ENGINE=tectonic ./build.sh

      - name: Upload built papers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: built-papers
          path: |
            papers/**/index.html
            papers/**/*.pdf
            template/index.html
            template/*.pdf
          if-no-files-found: ignore
